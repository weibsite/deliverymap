<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>網址快速瀏覽器</title>
  <!-- 引入 Tailwind CSS 以便快速排版 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 隱藏元素的實用類別 */
    .hidden-view { display: none !important; }
  </style>
</head>
<body class="bg-gray-50 font-sans">

  <!-- ==================== 輸入模式：貼上文字 ==================== -->
  <div id="input-view" class="min-h-screen flex flex-col items-center justify-center p-4 sm:p-8">
    <div class="w-full max-w-3xl bg-white rounded-2xl shadow-xl overflow-hidden">
      <div class="bg-blue-600 p-6 text-white">
        <h1 class="text-2xl font-bold flex items-center gap-2">
          網址快速瀏覽器
        </h1>
        <p class="text-blue-100 mt-2">
          貼上包含多個網址的文字（可混和一般文字），系統會自動為您挑出網址並建立連續瀏覽畫面。
        </p>
      </div>

      <div class="p-6">
        <div class="mb-4">
          <label for="mixed-text" class="block text-sm font-medium text-gray-700 mb-2">
            請在此貼上您的文字：
          </label>
          <textarea
            id="mixed-text"
            class="w-full h-64 p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none resize-y transition-shadow"
            placeholder="例如：&#10;旅遊資訊：憑證網址:https://txp.rs/viewvoucher.aspx?voucherguid=0C37B...憑證網址:https://txp.rs/..."
          ></textarea>
        </div>

        <!-- 錯誤訊息顯示區 -->
        <div id="error-message" class="hidden-view mb-4 p-3 bg-red-50 text-red-700 rounded-lg flex items-center gap-2 text-sm">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="error-text"></span>
        </div>

        <button
          id="start-btn"
          class="w-full py-4 rounded-xl text-lg font-bold shadow-md transition-all bg-gray-300 text-gray-500 cursor-not-allowed"
          disabled
        >
          確認並開始瀏覽
        </button>
      </div>
      
      <div class="px-6 pb-6 text-sm text-gray-500">
        💡 提示：系統會自動略過中文字，您不需要特地幫網址加上空白。
      </div>
    </div>
  </div>

  <!-- ==================== 視窗模式：瀏覽網址 ==================== -->
  <div id="viewer-view" class="hidden-view flex flex-col h-screen w-full bg-gray-50">
    <!-- 上方導覽列 -->
    <div class="flex items-center justify-between p-3 bg-white shadow-sm border-b border-gray-200 sticky top-0 z-10">
      <button
        id="back-btn"
        class="flex items-center gap-1 px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        <span class="hidden sm:inline">重新輸入</span>
      </button>

      <div class="flex items-center gap-4">
        <button
          id="prev-btn"
          class="p-2 rounded-full flex items-center justify-center transition-colors text-blue-600 hover:bg-blue-50 active:bg-blue-100 disabled:text-gray-300 disabled:cursor-not-allowed disabled:hover:bg-transparent"
          title="上一個網址"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>

        <div class="flex flex-col items-center min-w-[80px]">
          <span id="page-counter" class="text-lg font-bold text-gray-800 tracking-wider">
            1 / 1
          </span>
        </div>

        <button
          id="next-btn"
          class="p-2 rounded-full flex items-center justify-center transition-colors text-blue-600 hover:bg-blue-50 active:bg-blue-100 disabled:text-gray-300 disabled:cursor-not-allowed disabled:hover:bg-transparent"
          title="下一個網址"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>

      <a
        id="external-link"
        href="#"
        target="_blank"
        rel="noopener noreferrer"
        class="flex items-center gap-1 px-3 py-2 text-sm font-medium text-blue-600 hover:text-blue-800 hover:bg-blue-50 rounded-lg transition-colors"
        title="在新分頁中開啟此網址"
      >
        <span class="hidden sm:inline">另開分頁</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </a>
    </div>

    <!-- 提示訊息 -->
    <div class="bg-amber-50 px-4 py-2 text-xs sm:text-sm text-amber-700 flex items-center justify-center gap-2 border-b border-amber-100">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>如果畫面呈現空白或拒絕連線，代表該網站阻擋了嵌入功能，請點擊右上角「另開分頁」查看。</span>
    </div>

    <!-- 網頁顯示區域 (iframe) -->
    <div class="flex-1 w-full bg-gray-200 relative">
      <!-- 載入中的背景提示 -->
      <div id="loading-text" class="absolute inset-0 flex items-center justify-center text-gray-400 pointer-events-none px-4 text-center break-all">
        載入中... 
      </div>
      <iframe
        id="preview-iframe"
        src="about:blank"
        class="w-full h-full border-0 relative z-10 bg-white"
        sandbox="allow-same-origin allow-scripts allow-popups allow-forms"
      ></iframe>
    </div>
  </div>

  <!-- ==================== JavaScript 邏輯 ==================== -->
  <script>
    // 狀態變數
    let urls = [];
    let currentIndex = 0;

    // DOM 元素取得
    const textarea = document.getElementById('mixed-text');
    const startBtn = document.getElementById('start-btn');
    const errorBox = document.getElementById('error-message');
    const errorText = document.getElementById('error-text');
    
    const inputView = document.getElementById('input-view');
    const viewerView = document.getElementById('viewer-view');
    
    const backBtn = document.getElementById('back-btn');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const pageCounter = document.getElementById('page-counter');
    const externalLink = document.getElementById('external-link');
    const previewIframe = document.getElementById('preview-iframe');
    const loadingText = document.getElementById('loading-text');

    // 監聽文字輸入以改變按鈕狀態
    textarea.addEventListener('input', () => {
      const text = textarea.value.trim();
      if (text.length > 0) {
        startBtn.disabled = false;
        startBtn.classList.remove('bg-gray-300', 'text-gray-500', 'cursor-not-allowed');
        startBtn.classList.add('bg-blue-600', 'hover:bg-blue-700', 'text-white', 'hover:shadow-lg', 'active:scale-[0.98]');
      } else {
        startBtn.disabled = true;
        startBtn.classList.add('bg-gray-300', 'text-gray-500', 'cursor-not-allowed');
        startBtn.classList.remove('bg-blue-600', 'hover:bg-blue-700', 'text-white', 'hover:shadow-lg', 'active:scale-[0.98]');
      }
    });

    // 處理文字並萃取網址
    startBtn.addEventListener('click', () => {
      const inputText = textarea.value;
      // 使用正規表達式匹配網址
      const urlRegex = /(https?:\/\/[a-zA-Z0-9\-._~:/?#[\]@!$&'()*+,;=%]+)/g;
      const foundUrls = inputText.match(urlRegex);

      if (foundUrls && foundUrls.length > 0) {
        urls = foundUrls;
        currentIndex = 0;
        errorBox.classList.add('hidden-view');
        
        // 切換畫面
        inputView.classList.add('hidden-view');
        viewerView.classList.remove('hidden-view');
        
        updateViewer();
      } else {
        errorText.textContent = '在貼上的文字中找不到任何有效的網址，請重新確認。';
        errorBox.classList.remove('hidden-view');
      }
    });

    // 返回輸入畫面
    backBtn.addEventListener('click', () => {
      viewerView.classList.add('hidden-view');
      inputView.classList.remove('hidden-view');
      // 清空 iframe 避免背景繼續播放或載入
      previewIframe.src = 'about:blank';
    });

    // 上一個網址
    prevBtn.addEventListener('click', () => {
      if (currentIndex > 0) {
        currentIndex--;
        updateViewer();
      }
    });

    // 下一個網址
    nextBtn.addEventListener('click', () => {
      if (currentIndex < urls.length - 1) {
        currentIndex++;
        updateViewer();
      }
    });

    // 更新瀏覽器畫面 UI 與 iframe 內容
    function updateViewer() {
      const currentUrl = urls[currentIndex];
      
      // 更新計數器
      pageCounter.textContent = `${currentIndex + 1} / ${urls.length}`;
      
      // 更新按鈕狀態
      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = currentIndex === urls.length - 1;
      
      // 更新外部連結與載入文字
      externalLink.href = currentUrl;
      loadingText.textContent = `載入中... (${currentUrl})`;
      
      // 重新載入 iframe
      previewIframe.src = 'about:blank'; // 先清空強迫重整
      setTimeout(() => {
        previewIframe.src = currentUrl;
      }, 50);
    }
  </script>
</body>
</html>
