<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>尋狗地圖 - 像素探索版</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #2d3748;
            font-family: 'Courier New', Courier, monospace;
        }
        #map-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #map {
            width: 100%;
            height: 100%;
            background-color: #1a202c;
        }
        
        .leaflet-tile {
            filter: contrast(1.3) saturate(1.2) sepia(0.2);
            image-rendering: pixelated; 
        }

        /* --- 像素復古 UI 元件 --- */
        .pixel-panel {
            background-color: white;
            border: 4px solid #1a202c;
            box-shadow: 6px 6px 0px #1a202c;
            border-radius: 0px !important;
        }
        
        .pixel-btn {
            background-color: #f59e0b;
            color: #1a202c;
            border: 4px solid #1a202c;
            box-shadow: 6px 6px 0px #1a202c;
            border-radius: 0px !important;
            transition: all 0.1s;
            text-transform: uppercase;
            font-weight: 900;
            cursor: pointer;
        }
        .pixel-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px #1a202c;
        }
        
        .pixel-input {
            border: 4px solid #1a202c;
            border-radius: 0px !important;
            outline: none;
            font-weight: bold;
        }
        .pixel-input:focus {
            background-color: #fef3c7;
        }

        .custom-div-icon {
            background: transparent !important;
            border: none !important;
            overflow: visible !important; 
        }
        
        .user-label-container {
            position: absolute;
            bottom: 4px;
            left: -60px;
            width: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }
        
        .user-avatar-pixel {
            width: 16px;
            height: 16px;
            border: 3px solid #1a202c;
            box-sizing: border-box;
        }
        
        .user-name-tag {
            background: white;
            padding: 2px 6px;
            border: 2px solid #1a202c;
            font-size: 12px;
            font-weight: 900;
            white-space: nowrap;
            margin-bottom: 6px;
        }

        /* 修正閃爍動畫，避免完全透明變成隱形 */
        .blinking-red-pixel {
            animation: blink-pixel 1s infinite alternate;
        }

        @keyframes blink-pixel {
            0% { background-color: #ef4444; transform: scale(1); }
            100% { background-color: #fca5a5; transform: scale(1.3); }
        }
    </style>
</head>
<body>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <!-- 啟動遮罩層 -->
    <div id="startup-overlay" class="absolute inset-0 z-[3000] bg-black/70 flex items-center justify-center transition-opacity duration-300">
        <div class="pixel-panel p-6 w-11/12 max-w-md text-center transform transition-transform">
            <h2 class="text-2xl font-bold text-gray-900 mb-2">尋狗地圖</h2>
            <p class="text-gray-700 mb-4 text-sm font-bold">▶ 像素迷霧探索版 ◀<br><br>請輸入稱呼並允許定位，您的移動將以像素方塊驅散周圍迷霧！</p>
            
            <input type="text" id="user-name-input" placeholder="代號 (留空則隨機)" class="pixel-input w-full p-3 text-lg mb-4 text-center text-gray-900" />
            
            <button id="master-start-btn" class="pixel-btn w-full py-4 px-4 text-lg">
                START [授權定位]
            </button>
            
            <p id="error-msg" class="text-red-600 font-bold text-sm mt-4 hidden"></p>
        </div>
    </div>

    <!-- 常駐 UI 元件 -->
    <div id="status-toast" class="absolute top-4 right-4 z-[2000] pixel-panel p-2 text-sm font-bold text-gray-900 hidden flex items-center gap-2">
        <div class="w-3 h-3 bg-green-500 border-2 border-black" id="sync-ping"></div>
        <span id="toast-text">連線中...</span>
    </div>

    <button id="locate-btn" class="absolute bottom-8 left-4 z-[2000] pixel-btn p-3 hidden flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
            <circle cx="12" cy="12" r="3" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 2v2m0 16v2m10-10h-2M4 12H2" />
        </svg>
    </button>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- App Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- 狀態變數 ---
        let map, markersLayer;
        let auth, db, appId, currentUser;
        
        let currentUserName = "";
        let dbUserColor = ""; 
        let localHistory = []; 
        let lastSavedPos = null;
        let allUsersData = {};
        
        let watchId = null;
        let isSystemReady = false;
        let isOfflineMode = false;

        // 迷霧系統變數
        let fogCanvas, fogCtx;
        let lowResCanvas, lowResCtx;
        let fogRenderPending = false;
        const FOG_SCALE = 0.08;

        // --- DOM 元素 ---
        const startupOverlay = document.getElementById('startup-overlay');
        const nameInput = document.getElementById('user-name-input');
        const masterStartBtn = document.getElementById('master-start-btn');
        const errorMsg = document.getElementById('error-msg');
        const statusToast = document.getElementById('status-toast');
        const toastText = document.getElementById('toast-text');
        const locateBtn = document.getElementById('locate-btn');

        function generateRandomColor() {
            const colors = ['#3b82f6', '#10b981', '#8b5cf6', '#f97316', '#ec4899', '#06b6d4'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        // --- 1. 初始化系統 ---
        async function initSystem() {
            // 初始化 Leaflet
            map = L.map('map', { zoomControl: false }).setView([23.6978, 120.9605], 7);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
            L.control.zoom({ position: 'bottomright' }).addTo(map);
            
            markersLayer = L.layerGroup().addTo(map);
            
            map.createPane('fogPane');
            map.getPane('fogPane').style.zIndex = 450; 
            map.getPane('fogPane').style.pointerEvents = 'none';

            initFogSystem();

            map.on('locationfound', onLocationFound);
            map.on('locationerror', onLocationError);
            setInterval(renderMap, 15000); 

            // ==========================================
            // 👇 請在這裡貼上你申請的 Firebase Config 👇
            // ==========================================
            let firebaseConfig = {
                apiKey: "AIzaSyCY_WA9GnVHKLQnLyaJaRh5SpQa8P3ceOo",
                authDomain: "finddog-e89c3.firebaseapp.com",
                projectId: "finddog-e89c3",
                storageBucket: "finddog-e89c3.firebasestorage.app",
                messagingSenderId: "409601620505",
                appId: "1:409601620505:web:e7a30042d923547c514888",
                measurementId: "G-WHVQCY3P4H"
            };
            // ==========================================

            // 安全初始化 Firebase (允許在 AI 預覽環境中自動載入設定)
            try {
                if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                    firebaseConfig = JSON.parse(__firebase_config);
                }
            } catch(e) { console.warn("Firebase config parsing error"); }

            if (firebaseConfig && Object.keys(firebaseConfig).length > 0) {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'dog-finder-app';

                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch(e) { console.error("Auth error", e); }

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        isSystemReady = true;
                        listenToAllLocations();
                        checkLocalSetupAndStart();
                    }
                });
            } else {
                // 如果沒有 Firebase 環境 (如在地端直接打開檔案)，進入離線測試模式
                console.warn("未偵測到 Firebase 連線，進入單機測試模式");
                isOfflineMode = true;
                document.getElementById('sync-ping').style.backgroundColor = '#f59e0b'; // 橘燈表示單機
                checkLocalSetupAndStart();
            }
        }

        // --- 8-bit 像素迷霧系統 ---
        function initFogSystem() {
            fogCanvas = document.createElement('canvas');
            map.getPane('fogPane').appendChild(fogCanvas);
            fogCtx = fogCanvas.getContext('2d');
            
            lowResCanvas = document.createElement('canvas');
            lowResCtx = lowResCanvas.getContext('2d');

            function resizeAndPositionCanvas() {
                fogCanvas.width = window.innerWidth;
                fogCanvas.height = window.innerHeight;
                const topLeft = map.containerPointToLayerPoint([0, 0]);
                L.DomUtil.setPosition(fogCanvas, topLeft);
                requestFogRender();
            }

            window.addEventListener('resize', resizeAndPositionCanvas);
            map.on('move', resizeAndPositionCanvas);
            map.on('zoom', resizeAndPositionCanvas);
            
            resizeAndPositionCanvas();
        }

        function requestFogRender() {
            if (!fogRenderPending) {
                fogRenderPending = true;
                requestAnimationFrame(() => {
                    renderFog();
                    fogRenderPending = false;
                });
            }
        }

        function renderFog() {
            if (!map || !fogCtx) return;
            
            const w = Math.ceil(fogCanvas.width * FOG_SCALE);
            const h = Math.ceil(fogCanvas.height * FOG_SCALE);
            lowResCanvas.width = w;
            lowResCanvas.height = h;

            lowResCtx.fillStyle = 'rgba(15, 20, 25, 0.9)'; 
            lowResCtx.fillRect(0, 0, w, h);
            
            const center = map.getCenter();
            const metersPerPixel = (40075016.686 * Math.abs(Math.cos(center.lat * Math.PI/180))) / Math.pow(2, map.getZoom() + 8);
            const radiusPx = (500 / metersPerPixel) * FOG_SCALE;

            if (radiusPx >= 1) {
                lowResCtx.globalCompositeOperation = 'destination-out';
                Object.values(allUsersData).forEach(userData => {
                    if (!userData.history) return;
                    userData.history.forEach(point => {
                        const pt = map.latLngToContainerPoint([point.lat, point.lng]);
                        const sx = pt.x * FOG_SCALE;
                        const sy = pt.y * FOG_SCALE;
                        
                        if (sx > -radiusPx && sx < w + radiusPx && sy > -radiusPx && sy < h + radiusPx) {
                            lowResCtx.beginPath();
                            lowResCtx.arc(sx, sy, radiusPx, 0, Math.PI * 2);
                            lowResCtx.fill();
                        }
                    });
                });
                lowResCtx.globalCompositeOperation = 'source-over';
            }

            fogCtx.clearRect(0, 0, fogCanvas.width, fogCanvas.height);
            fogCtx.imageSmoothingEnabled = false; 
            fogCtx.drawImage(lowResCanvas, 0, 0, w, h, 0, 0, fogCanvas.width, fogCanvas.height);
        }

        // --- 2. 檢查本機儲存與啟動 ---
        function checkLocalSetupAndStart() {
            const savedName = localStorage.getItem('dogMap_userName');
            const savedColor = localStorage.getItem('dogMap_userColor');

            if (savedName) {
                currentUserName = savedName;
                dbUserColor = savedColor || generateRandomColor();
                if (!savedColor) localStorage.setItem('dogMap_userColor', dbUserColor);

                startupOverlay.style.display = 'none';
                statusToast.classList.remove('hidden');
                locateBtn.classList.remove('hidden');
                toastText.innerText = isOfflineMode ? "離線定位中..." : "自動定位...";

                startLocationServices(true);
            } else {
                startupOverlay.style.display = 'flex';
                startupOverlay.style.opacity = '1';
            }
        }

        masterStartBtn.addEventListener('click', (e) => {
            e.preventDefault();
            errorMsg.classList.add('hidden');
            masterStartBtn.innerText = "連線中...";

            let name = nameInput.value.trim();
            if (!name) name = `P${Math.floor(100 + Math.random() * 900)}`;
            currentUserName = name;
            dbUserColor = generateRandomColor();

            localStorage.setItem('dogMap_userName', currentUserName);
            localStorage.setItem('dogMap_userColor', dbUserColor);

            startLocationServices(false);
        });

        // --- 3. 定位核心服務 ---
        function startLocationServices(isAutoStart) {
            if (!navigator.geolocation) {
                showError("瀏覽器不支援定位");
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    handleValidPosition(position.coords.latitude, position.coords.longitude, Date.now());
                    finishUIReveal();
                },
                (error) => { handleGeoError(error, isAutoStart); },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );

            if (watchId) navigator.geolocation.clearWatch(watchId);
            watchId = navigator.geolocation.watchPosition(
                (position) => {
                    handleValidPosition(position.coords.latitude, position.coords.longitude, Date.now());
                },
                (error) => { console.warn("Watch Geo Error:", error); },
                { enableHighAccuracy: true, timeout: 20000, maximumAge: 5000 }
            );

            map.locate({ setView: false, watch: true, enableHighAccuracy: true });
        }

        function finishUIReveal() {
            startupOverlay.style.opacity = '0';
            setTimeout(() => { startupOverlay.style.display = 'none'; }, 300);
            statusToast.classList.remove('hidden');
            locateBtn.classList.remove('hidden');
            toastText.innerText = "位置同步成功";
        }

        function onLocationFound(e) {
            handleValidPosition(e.latlng.lat, e.latlng.lng, Date.now());
        }
        function onLocationError(e) {}

        function handleValidPosition(lat, lng, timestamp) {
            if (localHistory.length === 0) {
                map.setView([lat, lng], 17); 
            }

            if (lastSavedPos) {
                const dist = getDistance(lastSavedPos.lat, lastSavedPos.lng, lat, lng);
                if (dist < 5) return; 
            }

            const newPoint = { lat, lng, timestamp };
            localHistory.push(newPoint);
            lastSavedPos = newPoint;

            const oneHourAgo = timestamp - 60 * 60 * 1000;
            localHistory = localHistory.filter(p => p.timestamp > oneHourAgo);
            if (localHistory.length > 200) localHistory = localHistory.slice(-200);

            // [修復重點] Eager Update: 不要等伺服器回來，直接本地更新自己資料並重繪，保證紅點立刻出現
            const myUid = currentUser ? currentUser.uid : 'local_user';
            allUsersData[myUid] = {
                userName: currentUserName || "我",
                color: dbUserColor || "#ef4444",
                history: [...localHistory],
                lastUpdate: Date.now()
            };
            renderMap(); // 立刻強制重繪畫面

            if (isSystemReady) saveLocationToFirestore();
        }

        async function saveLocationToFirestore() {
            if (!isSystemReady || !currentUser || localHistory.length === 0) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'locations', currentUser.uid);
            try {
                await setDoc(docRef, {
                    userName: currentUserName,
                    color: dbUserColor,
                    history: localHistory,
                    lastUpdate: Date.now()
                }, { merge: true });
                
                document.getElementById('sync-ping').style.backgroundColor = 'white';
                setTimeout(() => document.getElementById('sync-ping').style.backgroundColor = '#10b981', 300);
            } catch (e) {
                console.error("Firestore Upload Error", e);
            }
        }

        // --- 4. 監聽與標記渲染 ---
        function listenToAllLocations() {
            const collectionRef = collection(db, 'artifacts', appId, 'public', 'data', 'locations');
            onSnapshot(collectionRef, (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added" || change.type === "modified") {
                        allUsersData[change.doc.id] = change.doc.data();
                    }
                    if (change.type === "removed") delete allUsersData[change.doc.id];
                });
                renderMap();
            }, (error) => {
                console.error("即時資料監聽失敗:", error);
            });
        }

        function renderMap() {
            if (!markersLayer) return;
            markersLayer.clearLayers();
            
            const now = Date.now();
            const maxFadeTime = 30 * 60 * 1000; 
            
            // [修復重點] 正確判斷是否為自己 (支援離線模式)
            const myUid = currentUser ? currentUser.uid : 'local_user';

            Object.keys(allUsersData).forEach(uid => {
                const userData = allUsersData[uid];
                if (!userData.history || userData.history.length === 0) return;

                const history = userData.history;
                const isSelf = (uid === myUid); // 修正為確保精準匹配
                const renderColor = isSelf ? '#ef4444' : (userData.color || '#3b82f6');

                history.forEach((point, index) => {
                    const age = Math.max(0, now - point.timestamp);
                    let opacity = Math.max(0.15, Math.min(1.0, 1 - (age / maxFadeTime)));

                    if (age < 60 * 60 * 1000) { 
                        const isLatest = index === history.length - 1;

                        if (!isLatest) {
                            const trailHtml = `<div style="position:absolute; left:-4px; top:-4px; width:8px; height:8px; background-color:${renderColor}; opacity:${opacity}; border:2px solid #1a202c;"></div>`;
                            const trailIcon = L.divIcon({
                                className: 'custom-div-icon',
                                html: trailHtml,
                                iconSize: [0, 0],
                                iconAnchor: [0, 0]
                            });
                            L.marker([point.lat, point.lng], { icon: trailIcon, zIndexOffset: isSelf ? 2000 : 500 }).addTo(markersLayer);
                        } else {
                            const avatarHtml = isSelf 
                                ? `<div class="user-avatar-pixel blinking-red-pixel"></div>`
                                : `<div class="user-avatar-pixel" style="background-color: ${renderColor};"></div>`;
                            
                            const nameColor = isSelf ? 'color: #ef4444;' : 'color: #1a202c;';

                            const customIcon = L.divIcon({
                                className: 'custom-div-icon',
                                html: `
                                    <div class="user-label-container">
                                        <div class="user-name-tag pixel-panel" style="${nameColor}">${userData.userName}</div>
                                        ${avatarHtml}
                                    </div>
                                `,
                                iconSize: [0, 0],
                                iconAnchor: [0, 0]
                            });
                            
                            L.marker([point.lat, point.lng], { 
                                icon: customIcon, 
                                zIndexOffset: isSelf ? 5000 : 1000 
                            }).addTo(markersLayer);
                        }
                    }
                });
            });
            
            requestFogRender();
        }

        // --- 工具 ---
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const p1 = lat1 * Math.PI/180;
            const p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180;
            const dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        locateBtn.addEventListener('click', () => {
            if (lastSavedPos) {
                map.setView([lastSavedPos.lat, lastSavedPos.lng], 17, { animate: true });
            }
        });

        function handleGeoError(error, isAutoStart) {
            masterStartBtn.innerText = "START [重新授權]";
            if (isAutoStart) {
                startupOverlay.style.display = 'flex';
                startupOverlay.style.opacity = '1';
                statusToast.classList.add('hidden');
                locateBtn.classList.add('hidden');
            }
            let msg = "無定位權限。請至手機設定中確認。";
            if (error.code === 2) msg = "無法獲取位置，請確認 GPS 已開啟。";
            if (error.code === 3) msg = "獲取位置逾時，請檢查網路。";
            showError(msg);
        }

        function showError(msg) {
            errorMsg.innerText = msg;
            errorMsg.classList.remove('hidden');
        }

        window.addEventListener('DOMContentLoaded', initSystem);
    </script>
</body>
</html>
