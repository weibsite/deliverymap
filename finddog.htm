<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>尋狗地圖 - 像素探索版</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #2d3748;
            font-family: 'Courier New', Courier, monospace;
        }
        #map-container { position: relative; width: 100vw; height: 100vh; }
        #map { width: 100%; height: 100%; background-color: #1a202c; }
        .leaflet-tile { filter: contrast(1.3) saturate(1.2) sepia(0.2); image-rendering: pixelated; }
        
        .pixel-panel { background-color: white; border: 4px solid #1a202c; box-shadow: 6px 6px 0px #1a202c; border-radius: 0px !important; }
        .pixel-btn { background-color: #f59e0b; color: #1a202c; border: 4px solid #1a202c; box-shadow: 6px 6px 0px #1a202c; border-radius: 0px !important; transition: all 0.1s; font-weight: 900; cursor: pointer; }
        .pixel-btn:active { transform: translate(4px, 4px); box-shadow: 2px 2px 0px #1a202c; }
        
        .custom-div-icon { background: transparent !important; border: none !important; }
        .user-label-container { position: absolute; bottom: 4px; left: -60px; width: 120px; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .user-avatar-pixel { width: 16px; height: 16px; border: 3px solid #1a202c; box-sizing: border-box; }
        .user-name-tag { background: white; padding: 2px 6px; border: 2px solid #1a202c; font-size: 12px; font-weight: 900; margin-bottom: 6px; }

        @keyframes pulse-square { 0% { transform: scale(0.5); opacity: 1; border-width: 4px; } 100% { transform: scale(4); opacity: 0; border-width: 1px; } }
        .center-pulse-square { position: absolute; left: -16px; top: -16px; width: 32px; height: 32px; border: 4px solid #ef4444; box-sizing: border-box; animation: pulse-square 2s infinite linear; pointer-events: none; }
    </style>
</head>
<body>
    <div id="map-container"><div id="map"></div></div>

    <!-- UI 介面維持不變 -->
    <div id="startup-overlay" class="absolute inset-0 z-[3000] bg-black/70 flex items-center justify-center">
        <div class="pixel-panel p-6 w-11/12 max-w-md text-center">
            <h2 class="text-2xl font-bold mb-2">尋狗地圖</h2>
            <button id="master-start-btn" class="pixel-btn w-full py-4 px-4 text-lg">START [授權定位]</button>
        </div>
    </div>

    <button id="spectator-btn" class="absolute bottom-24 left-4 z-[2000] pixel-btn p-2 text-xs hidden">觀看模式</button>
    <button id="locate-btn" class="absolute bottom-8 left-4 z-[2000] pixel-btn p-3 hidden">中心點</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let map, markersLayer, fogCanvas, fogCtx;
        let allUsersData = {}, currentUser, isSpectatorMode = false;
        const LOST_DOG_CENTER = [23.7509678, 120.3995609];

        // 初始化
        async function initSystem() {
            map = L.map('map', { zoomControl: false }).setView(LOST_DOG_CENTER, 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            markersLayer = L.layerGroup().addTo(map);
            
            // 繪製中心點
            const centerIcon = L.divIcon({ className: 'custom-div-icon', html: `<div class="center-pulse-square"></div><div style="font-size:24px;">🐕</div>` });
            L.marker(LOST_DOG_CENTER, { icon: centerIcon }).addTo(map);

            // 畫布層
            map.createPane('fogPane'); map.getPane('fogPane').style.zIndex = 450;
            fogCanvas = document.createElement('canvas'); map.getPane('fogPane').appendChild(fogCanvas);
            fogCtx = fogCanvas.getContext('2d');
            window.addEventListener('resize', () => { fogCanvas.width = window.innerWidth; fogCanvas.height = window.innerHeight; });
            
            // (省略 Firebase 初始化與定位邏輯，與前版相同)
        }

        // 核心渲染邏輯 (移除了 strokeRect)
        function renderFog() {
            const now = Date.now();
            const ONE_HOUR = 60 * 60 * 1000;
            
            Object.keys(allUsersData).forEach(uid => {
                if (isSpectatorMode && uid === (currentUser?.uid || 'local_user')) return;
                const userData = allUsersData[uid];
                if (!userData.history) return;

                const renderColor = userData.color || '#3b82f6';
                userData.history.forEach((point, index) => {
                    const age = now - point.timestamp;
                    if (age < ONE_HOUR && index !== userData.history.length - 1) {
                        const pt = map.latLngToContainerPoint([point.lat, point.lng]);
                        // 移除黑邊框邏輯，只畫純色塊
                        fogCtx.fillStyle = renderColor;
                        fogCtx.globalAlpha = Math.max(0.15, 1 - (age / (30 * 60 * 1000)));
                        fogCtx.fillRect(pt.x - 3, pt.y - 3, 6, 6);
                    }
                });
            });
            fogCtx.globalAlpha = 1.0;
        }

        window.addEventListener('DOMContentLoaded', initSystem);
    </script>
</body>
</html>
